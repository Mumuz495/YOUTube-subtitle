name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Cloudflare Worker dependencies
        run: npm ci

      - name: Compile Python files
        run: python -m py_compile app.py transcript_tool.py fetch_transcript.py daily_run.py subtitle_studio/*.py scripts/smoke_deployment.py scripts/preflight.py

      - name: Check Cloudflare Worker syntax
        run: node --check src/cloudflare-worker.js

      - name: Run tests
        env:
          BROWSER_EXECUTABLE: /usr/bin/chromium
        run: python -m unittest discover -s tests

      - name: Run preflight checks
        env:
          BROWSER_EXECUTABLE: /usr/bin/chromium
        run: python scripts/preflight.py

      - name: Build Docker image
        run: docker build -t subtitle-studio:test .
