services:
  - type: web
    name: subtitle-studio
    env: docker
    autoDeploy: true
    healthCheckPath: /healthz
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PUBLIC_DEPLOYMENT
        value: "1"
      - key: RATE_LIMIT_ENABLED
        value: "1"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "60"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "600"
      - key: OUTPUT_RETENTION_HOURS
        value: "24"
      - key: APP_USERNAME
        value: friend
      - key: APP_PASSWORD
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
